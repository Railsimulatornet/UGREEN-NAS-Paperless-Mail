# Paperless-ngx:latest with Redis 8 and PostgreSQL 18 on UGREEN NAS
# Based on your previous docker-compose.yaml (v1.2) and paperlessngx.env
# IMPORTANT: PostgreSQL uses a NAMED VOLUME here -> no chmod/chown issues on first start (handled automatically).

services:
  # Redis container
  broker:
    image: docker.io/library/redis:8
    container_name: Paperless-ngx-Redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - paperless_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL container
  db:
    image: docker.io/library/postgres:18
    container_name: Paperless-ngx-PostgreSQL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    # ✅ Named Volume: Docker manages permissions itself -> no mkdir/chown required
    volumes:
      - paperless_pgdata:/var/lib/postgresql

    # ✅ All DB credentials in paperlessngx.env (KEY=VALUE)
    env_file:
      - ./paperlessngx.env

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Paperless-ngx container
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: Paperless-ngx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    # If your Compose/UGOS does not support 'condition: service_healthy',
    # replace the entire depends_on block with:
    # depends_on:
    #   - db
    #   - broker
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy

    ports:
      - "8180:8000"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

    volumes:
      - /volume2/docker/paperless-ngx/data:/usr/src/paperless/data:rw
      - /volume2/docker/paperless-ngx/media:/usr/src/paperless/media:rw
      - /volume2/docker/paperless-ngx/export:/usr/src/paperless/export:rw
      - /volume2/docker/paperless-ngx/consume:/usr/src/paperless/consume:rw

    # ✅ All passwords + (optional) additional Paperless settings are in paperlessngx.env
    env_file:
      - ./paperlessngx.env

volumes:
  paperless_pgdata:
  paperless_redisdata:
